<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me? 💖</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Comic Sans MS', cursive;
        overflow: hidden;
        height: 100vh;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
        background-size: 400% 400%;
        animation: gradientMove 10s ease infinite;
        position: relative;
    }
    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Screen shake */
    @keyframes shake {
        0% { transform: translate(0, 0); }
        20% { transform: translate(-10px, 10px); }
        40% { transform: translate(10px, -10px); }
        60% { transform: translate(-10px, 10px); }
        80% { transform: translate(10px, -10px); }
        100% { transform: translate(0, 0); }
    }

    /* Button shake */
    @keyframes btnShake {
        0% { transform: translate(0, 0); }
        25% { transform: translate(-3px, 3px); }
        50% { transform: translate(3px, -3px); }
        75% { transform: translate(-3px, 3px); }
        100% { transform: translate(0, 0); }
    }

    #mainContent {
        position: relative;
        z-index: 2;
        text-align: center;
        top: 50%;
        transform: translateY(-50%);
    }

    h1 {
        color: #fff;
        font-size: 34px;
        text-shadow: 0 0 10px rgba(255,255,255,0.8);
    }
    h2 {
        color: #fff;
        font-size: 26px;
        margin-bottom: 30px;
        text-shadow: 0 0 8px rgba(255,255,255,0.7);
    }

    .buttons {
        position: relative;
        height: 200px;
    }

    button {
        padding: 14px 22px;
        font-size: 16px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        position: absolute;
    }

    #yesBtn {
        background: linear-gradient(45deg, #ff4d6d, #ff758c);
        color: white;
        left: 30%;
        top: 50%;
        transform: translate(-50%, -50%);
    }
    #yesBtn:hover { transform: translate(-50%, -50%) scale(1.12); }

    #noBtn {
        background: linear-gradient(45deg, #6c757d, #9aa0a6);
        color: white;
        left: 70%;
        top: 50%;
        transform: translate(-50%, -50%);
    }

    #message {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 32px;
        color: white;
        display: none;
        text-align: center;
        text-shadow: 0 0 15px rgba(255,255,255,0.9);
        z-index: 1000;
    }

</style>
</head>
<body>
<div id="mainContent">
    <h1>🐻💖🐻</h1>
    <h2>Do you love me?</h2>
    <div class="buttons" id="btnArea">
        <button id="yesBtn">Yes 💕</button>
        <button id="noBtn">No 😢</button>
    </div>
</div>

<div id="message">Wise choice <br> I love you too! <br> 😌💖 </div>

<canvas id="fireworksCanvas"></canvas>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");
const mainContent = document.getElementById("mainContent");
const body = document.body;
const canvas = document.getElementById("fireworksCanvas");
const ctx = canvas.getContext("2d");

let fireworks = [];
let particles = [];
let animationFrame;

// Resize canvas
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Fireworks classes (same as before)
class Firework {
    constructor(x, y, targetX, targetY) {
        this.x = x; this.y = y;
        this.targetX = targetX; this.targetY = targetY;
        this.speed = 5 + Math.random() * 3;
        this.angle = Math.atan2(targetY - y, targetX - x);
        this.distance = Math.hypot(targetX - x, targetY - y);
        this.traveled = 0;
        this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
    }
    update() {
        let vx = Math.cos(this.angle) * this.speed;
        let vy = Math.sin(this.angle) * this.speed;
        this.x += vx; this.y += vy;
        this.traveled += Math.sqrt(vx*vx + vy*vy);
        if(this.traveled >= this.distance){ this.explode(); return false; }
        return true;
    }
    explode() {
        const count = 20 + Math.random() * 20;
        for(let i=0;i<count;i++){ particles.push(new Particle(this.x, this.y, this.color)); }
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = 2 + Math.random() * 4;
        this.friction = 0.95;
        this.alpha = 1;
        this.decay = 0.02 + Math.random() * 0.02;
    }
    update() {
        this.speed *= this.friction;
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.alpha -= this.decay;
        return this.alpha > 0;
    }
    draw() {
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.1)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    fireworks = fireworks.filter(f => f.update());
    particles = particles.filter(p => { p.update(); p.draw(); return p.alpha > 0; });
    animationFrame = requestAnimationFrame(animate);
}

function launchFireworks() {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height / 2;
    fireworks.push(new Firework(canvas.width/2, canvas.height, x, y));
}

// YES button click
yesBtn.addEventListener("click", () => {
    mainContent.style.display = "none";
    noBtn.remove();
    message.style.display = "block";
    animate();
    setInterval(launchFireworks, 400);
});

// NO button click: shake screen & button
noBtn.addEventListener("click", (e) => {
    e.preventDefault();

    // Shake screen
    body.style.animation = "shake 0.5s";
    body.addEventListener("animationend", () => body.style.animation = "", {once:true});

    // Shake button
    noBtn.style.animation = "btnShake 0.3s";
    noBtn.addEventListener("animationend", () => noBtn.style.animation = "", {once:true});

    // Move button to a new corner **inside its container**
    const area = document.getElementById("btnArea");
    const areaRect = area.getBoundingClientRect();
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const positions = [
        {x: 10, y: 10},
        {x: areaRect.width - btnWidth - 10, y: 10},
        {x: 10, y: areaRect.height - btnHeight - 10},
        {x: areaRect.width - btnWidth - 10, y: areaRect.height - btnHeight - 10},
        {x: areaRect.width/2 - btnWidth/2, y: 10},
        {x: areaRect.width/2 - btnWidth/2, y: areaRect.height - btnHeight - 10}
    ];

    const pos = positions[Math.floor(Math.random() * positions.length)];
    noBtn.style.left = pos.x + "px";
    noBtn.style.top = pos.y + "px";
});
</script>
</body>
</html>
