<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me? 💖</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Comic Sans MS', cursive;
        overflow: hidden;
        text-align: center;
        height: 100vh;

        /* Multi-color romantic gradient */
        background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
        background-size: 400% 400%;
        animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Soft glowing blobs */
    body::before,
    body::after {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
    }

    body::before {
        top: -100px;
        left: -100px;
    }

    body::after {
        bottom: -100px;
        right: -100px;
    }

    .container {
        position: relative;
        z-index: 2;
        top: 50%;
        transform: translateY(-50%);
        padding: 20px;
    }

    h1 {
        color: #fff;
        font-size: 34px;
        text-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    h2 {
        color: #fff;
        font-size: 26px;
        margin-bottom: 30px;
        text-shadow: 0 0 8px rgba(255,255,255,0.7);
    }

    .buttons {
        position: relative;
        height: 200px;
    }

    button {
        padding: 14px 22px;
        font-size: 16px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    #yesBtn {
        background: linear-gradient(45deg, #ff4d6d, #ff758c);
        color: white;
    }

    #yesBtn:hover {
        transform: scale(1.12);
    }

    #noBtn {
        background: linear-gradient(45deg, #6c757d, #9aa0a6);
        color: white;
        position: absolute;
        left: 60%;
        top: 50%;
        transform: translate(-50%, -50%);
    }

    #message {
        margin-top: 20px;
        font-size: 22px;
        color: white;
        display: none;
        text-shadow: 0 0 10px rgba(255,255,255,0.9);
    }

    /* Floating hearts */
    .heart {
        position: absolute;
        color: rgba(255, 255, 255, 0.7);
        font-size: 20px;
        animation: float 6s infinite ease-in;
    }

    @keyframes float {
        0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* Sparkles ✨ */
    .sparkle {
        position: absolute;
        width: 6px;
        height: 6px;
        background: white;
        border-radius: 50%;
        opacity: 0.8;
        animation: sparkle 2s infinite ease-in-out;
    }

    @keyframes sparkle {
        0%, 100% { transform: scale(0.5); opacity: 0.3; }
        50% { transform: scale(1.5); opacity: 1; }
    }

    /* Monkey watermark */
    .monkey {
        position: fixed;
        bottom: 10px;
        right: 10px;
        opacity: 0.05;
        font-size: 100px;
        z-index: 1;
    }
</style>
</head>

<body>

<div class="container">
    <h1>🐻💖🐻</h1>
    <h2>Do you love me?</h2>

    <div class="buttons" id="btnArea">
        <button id="yesBtn">Yes 💕</button>
        <button id="noBtn">No 😢</button>
    </div>

    <div id="message">Wise choice 😌💖 I love you too!</div>
</div>

<div class="monkey">🐵</div>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");
    const area = document.getElementById("btnArea");

    // Safe positions (corners + center-ish)
    function moveNoButton() {
        const areaRect = area.getBoundingClientRect();
        const btnWidth = noBtn.offsetWidth;
        const btnHeight = noBtn.offsetHeight;

        const positions = [
            { x: 10, y: 10 }, // top-left
            { x: areaRect.width - btnWidth - 10, y: 10 }, // top-right
            { x: 10, y: areaRect.height - btnHeight - 10 }, // bottom-left
            { x: areaRect.width - btnWidth - 10, y: areaRect.height - btnHeight - 10 }, // bottom-right
            { x: areaRect.width / 2 - btnWidth / 2, y: 10 },
            { x: areaRect.width / 2 - btnWidth / 2, y: areaRect.height - btnHeight - 10 }
        ];

        const randomPos = positions[Math.floor(Math.random() * positions.length)];

        noBtn.style.left = randomPos.x + "px";
        noBtn.style.top = randomPos.y + "px";
    }

    // Desktop hover
    noBtn.addEventListener("mouseover", moveNoButton);

    // Mobile tap
    noBtn.addEventListener("click", (e) => {
        e.preventDefault();
        moveNoButton();
    });

    // YES button
    yesBtn.addEventListener("click", () => {
        message.style.display = "block";
    });

    // Floating hearts
    function createHearts() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHearts, 400);
    // Sparkles generator
function createSparkle() {
    const sparkle = document.createElement("div");
    sparkle.classList.add("sparkle");

    sparkle.style.left = Math.random() * 100 + "vw";
    sparkle.style.top = Math.random() * 100 + "vh";

    document.body.appendChild(sparkle);

    setTimeout(() => sparkle.remove(), 2000);
}

setInterval(createSparkle, 200);
</script>

</body>
</html>
